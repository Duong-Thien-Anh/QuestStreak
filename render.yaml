# Render deployment configuration
# https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: lunis-house-app
    runtime: node
    region: singapore      # Closest to Vietnam
    plan: free             # Change to 'starter' for always-on service

    buildCommand: npm ci && npm run build
    startCommand: npm run start

    envVars:
      - key: NODE_ENV
        value: production

      # ── App ─────────────────────────────────────────────────────
      - key: APP_ID
        sync: false        # Set manually in Render dashboard

      - key: APP_SECRET
        sync: false

      # ── Database (Neon PostgreSQL) ───────────────────────────────
      - key: DATABASE_URL
        sync: false        # Paste Neon connection string from dashboard

      # ── Kimi OAuth ──────────────────────────────────────────────
      - key: KIMI_AUTH_URL
        sync: false

      - key: KIMI_OPEN_URL
        sync: false

      # ── Frontend (Vite VITE_ prefix = exposed to browser) ────────
      - key: VITE_KIMI_AUTH_URL
        sync: false

      - key: VITE_APP_ID
        sync: false

      # ── Admin ───────────────────────────────────────────────────
      - key: OWNER_UNION_ID
        sync: false
